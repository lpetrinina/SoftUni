<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Layout - Section & Wrapper</title>
        <link rel="stylesheet" href="layout-section-and-wrapper.css">
    </head>

    <body>

        <div class="site">

            <header class="section site-header">
                <div class="wrapper">
                    <p>Header</p>
                </div>
            </header>

            <main class="section site-container">
                <div class="wrapper">
                    <p>Main</p>
                </div>
            </main>

            <footer class="section site-footer">
                <div class="wrapper">
                    <p>Footer</p>
                </div>
            </footer>

        </div>

    </body>

</html>
